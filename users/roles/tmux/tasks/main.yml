---

- name: Install tmux plugin manager
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ home }}/.tmux/plugins/tmp"
    update: yes

- name: Link tmux config
  ansible.builtin.file:
    src: "{{ core.dirs.users }}/roles/tmux/files/tmux.conf"
    dest: "{{ home }}/.tmux.conf"
    state: link
