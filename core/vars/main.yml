---
home: "{{ ansible_env.HOME }}"
my: "{{ home }}/.my"

core:
  version: "wip-ansible"

  settings:
    host: "localhost"

  dirs:
    bin: "{{ my }}/bin"
    local: "{{ my }}/local"

    dotfiles: "{{ my }}/dotfiles"
    custom: "{{ my }}/dotfiles/custom"

    vars: "{{ my }}/dotfiles/core/vars"
    core: "{{ my }}/core"

    init: "{{ my }}/init"
    init_d: "{{ my }}/init/init.d"
    custom_d: "{{ my }}/init/custom.d"

    cache: "{{ home }}/.cache/my"

  files:
    inventory: "{{ my }}/dotfiles/core/inventory"
    roles: "{{ my }}/dotfiles/core/core.yml"
    init: "{{ my }}/init/init.sh"

    generated:
      tags: "{{ home }}/.cache/my/tags.yml"

  git:
    name: "dotfiles"
