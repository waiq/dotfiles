---
home: "{{ ansible_env.HOME }}"
my: "{{ home }}/.my"

core:
  version: "wip_ansibale"

  settings:
    host: "localhost"

  dirs:
    bin: "{{ my }}/bin"
    dotfiles: "{{ my }}/dotfiles"
    users: "{{ my }}/dotfiles/users"

    vars: "{{ my }}/dotfiles/core/vars"
    core: "{{ my }}/core"

    init: "{{ my }}/init"
    init_d: "{{ my }}/init/init.d"
    local_d: "{{ my }}/init/local.d"

    cache: "{{ home }}/.cache/my"

  files:
    inventory: "{{ my }}/dotfiles/core/inventory"
    commands: "{{ my }}/dotfiles/core/core.yml"
    init: "{{ my }}/init/init.sh"

    generated:
      tags: "{{ home }}/.cache/my/tags.yml"

  git:
    name: "dotfiles"
