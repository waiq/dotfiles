os:
  editPreset: "nvim-remote"

customCommands:
  - key: "E"
    description: "Add empty commit"
    context: "commits"
    prompts:
      - type: "input"
        title: "Empty commit message"
        key: "CommitMessage"
        initialValue: ""
    command: 'git commit --allow-empty -m "{{.Form.CommitMessage}}"'
    loadingText: "Committing empty commit..."
