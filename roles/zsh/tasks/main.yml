- name: Check for oh-my-zsh installation
  ansible.builtin.stat: 
    path: "{{ home }}/.oh-my-zsh"
  register: oh_my_zsh_stat

- name: Install oh-my-zsh
  ansible.builtin.raw: "sh -c \"$(curl -fsSL https://raw.githubusercontent.com/robbyrussell/oh-my-zsh/master/tools/install.sh)\""
  when: oh_my_zsh_stat.stat.exists == false

- name: Check for .zshrc
  ansible.builtin.stat: 
    path: "{{ home }}/.zshrc"
  register: zshrc_stat

- name: Backup ohmz org zshrc
  ansible.builtin.copy: 
    src: "{{ home }}/.zshrc" 
    dest: "{{ home }}/.zshrc.org"
  when: oh_my_zsh_stat.stat.exists == false && zshrc_stat.state.exists 

- name: Backup zshrc
  ansible.builtin.copy: 
    src: "{{ home }}/.zshrc" 
    dest: "{{ home }}/.zshrc.bak"
  when: zshrc_stat.stat.exists

- name: Remove old zshrc
  ansible.builtin.file:
    path: "{{ home }}/.zshrc"
    state: absent 
  when: zshrc_stat.stat.exists

- name: Make sure zshrc is up to date
  ansible.builtin.template:
    src: "{{ my_dir_dotfiles }}/roles/zsh/template/zshrc.j2"
    dest: "{{ home }}/.zshrc"
